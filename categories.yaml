name: Democracy Redline Intake Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1,4'  # Mon & Thu at 14:00 UTC

jobs:
  run-intake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env <<'ENVEOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
          GOOGLE_SHEETS_ENABLED=${{ secrets.GOOGLE_SHEETS_ENABLED }}
          GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_WORKSHEET_NAME=${{ secrets.GOOGLE_WORKSHEET_NAME }}
          GOOGLE_SERVICE_ACCOUNT_JSON=${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MAX_ITEMS_PER_RUN=${{ secrets.MAX_ITEMS_PER_RUN }}
          LOOKBACK_DAYS=${{ secrets.LOOKBACK_DAYS }}
          MIN_CREDIBLE_SOURCES=${{ secrets.MIN_CREDIBLE_SOURCES }}
          OUTPUT_CSV_PATH=output/monthly_intake.csv
          ENVEOF

      - name: Run intake agent
        run: python src/main.py

      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: democracy-redline-intake-output
          path: output/

      - name: Commit latest output snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Update intake output snapshot"
          git push
