name: Democracy Redline Intake Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

jobs:
  run-intake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Show repo files
        run: |
          pwd
          ls -la
          echo "Config folder:"
          ls -la config || true

      - name: Show runtime settings
        run: |
          echo "config/runtime_settings.yaml:"
          cat config/runtime_settings.yaml || true

      - name: Create output folder
        run: mkdir -p output

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run intake pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
        run: |
          python main.py

      - name: List output files
        if: always()
        run: |
          echo "Output folder contents:"
          ls -la output || true

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intake-output
          path: output/
